server:
  port: 8080

spring:
  application:
    name: fate-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fate_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

app:
  jwt-secret: ${JWT_SECRET:fate-platform-demo-secret-change-me}
  jwt-ttl-seconds: 86400

fate:
  mode: ${FATE_MODE:MOCK}
  flow-url: ${FATE_FLOW_URL:http://localhost:9380}
  pipeline-python: ${FATE_PIPELINE_PYTHON:python}
  scripts-dir: ${FATE_SCRIPTS_DIR:./fate-scripts}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
