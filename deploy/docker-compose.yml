services:
  mysql:
    image: mysql:8.4
    container_name: fate-platform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: fate_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

  backend:
    build:
      context: ../backend
    container_name: fate-platform-backend
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/fate_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: 123456
      SQL_INIT_MODE: always
      FATE_MODE: MOCK
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: fate-platform-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
